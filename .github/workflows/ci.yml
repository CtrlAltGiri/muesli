name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # Detect which files changed — runs on every trigger
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      native: ${{ steps.filter.outputs.native }}
    steps:
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            native:
              - 'native/**'
              - '.github/workflows/ci.yml'

  # Swift build + tests — only when native code changes
  build-and-test:
    needs: changes
    if: needs.changes.outputs.native == 'true'
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build (release)
        run: swift build --package-path native/MuesliNative -c release --product MuesliNativeApp

      - name: Run tests
        run: swift test --package-path native/MuesliNative

  # Gate job — always runs, always reports a status
  # Use THIS as the only required check in branch protection
  ci-gate:
    if: always()
    needs: [changes, build-and-test]
    runs-on: ubuntu-latest
    steps:
      - name: Check result
        run: |
          if [[ "${{ needs.build-and-test.result }}" =~ ^(success|skipped)$ ]]; then
            echo "CI passed (build-and-test: ${{ needs.build-and-test.result }})"
          else
            echo "CI failed (build-and-test: ${{ needs.build-and-test.result }})"
            exit 1
          fi
